<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پنل مدیریت || کافه ژوان</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin-style.css">
</head>
<body>

<div id="loginScreen">
    <div id="loginBox">
        <h2>پنل مدیریت</h2>
        <p>کافه ژوان</p>
        <input type="password" id="passwordInput" placeholder="رمز عبور را وارد کنید">
        <button id="loginBtn">ورود</button>
        <p id="loginError" style="color:#e55;display:none">رمز اشتباه است</button>
    </div>
</div>

<div id="adminPanel" style="display:none">

<header class="admin-header">
    <h1>کافه ژوان</h1>
    <p>پنل مدیریت سفارشات</p>
</header>

<div id="status">
    <div class="stat-card">
        <span class="stat-label">سفارشات امروز</span>
        <span class="stat-value" id="todayOrders">0</span>
    </div>
    <div class="stat-card gold">
        <span class="stat-label">فروش امروز</span>
        <span class="stat-value" id="todaySales">0</span> تومان</span>
    </div>
    <div class="stat-card">
        <span class="stat-label">در انتظار</span>
        <span class="stat-value" id="pendingCount">0</span>
    </div>
    <div class="stat-card">
        <span class="stat-label">آماده</span>
        <span class="stat-value" id="readyCount">0</span>
    </div>
    <div class="stat-card">
        <span class="stat-label">تحویل داده شد</span>
        <span class="stat-value" id="doneCount">0</span>
    </div>
    
</div>

<button id="clearDoneOrders">حذف سفارش های تحویل داده شده</button>

<h2 class="section-title">۳ سفارش آخر</h2>
<div id="latestOrdersContainer"></div>

<h2 class="section-title">سایر سفارش ها</h2>

<div id="statusFilter">
    <button class="filter-btn active" data-filter="all">همه</button>
    <button class="filter-btn" data-filter="در انتظار">در انتظار</button>
    <button class="filter-btn" data-filter="آماده شد">آماده</button>
    <button class="filter-btn" data-filter="تحویل داده شد"> تحویل داده شد</button>
</div>

<div id="ordersContainer"></div>

<script src="admin.js"></script>

</div>
</body>
</html>
